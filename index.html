<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎙 Transcritor de Áudio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #030712;
      color: #f9fafb;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 2rem;
    }
    h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; }
    .toggle {
      display: flex;
      border: 1px solid #374151;
      border-radius: 8px;
      overflow: hidden;
    }
    .toggle button {
      padding: 0.5rem 1.5rem;
      background: #111827;
      color: #9ca3af;
      border: none;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    .toggle button.active {
      background: #4f46e5;
      color: #fff;
    }
    .panel { width: 100%; max-width: 520px; }
    .dropzone {
      border: 2px dashed #374151;
      border-radius: 12px;
      padding: 3rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .dropzone:hover, .dropzone.drag { border-color: #818cf8; background: #1e1b4b; }
    .dropzone p { color: #9ca3af; }
    .dropzone small { color: #4b5563; display: block; margin-top: 0.25rem; }
    .link-row { display: flex; gap: 0.5rem; flex-direction: column; }
    .link-row label { font-size: 0.875rem; color: #9ca3af; }
    .link-row .row { display: flex; gap: 0.5rem; }
    input[type=url] {
      flex: 1;
      background: #111827;
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      color: #fff;
      font-size: 0.875rem;
      outline: none;
    }
    input[type=url]:focus { border-color: #6366f1; }
    button.btn {
      padding: 0.5rem 1.25rem;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    button.btn:hover { background: #4338ca; }
    button.btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .loading { display: flex; align-items: center; gap: 0.75rem; color: #818cf8; }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error {
      background: #450a0a;
      border: 1px solid #991b1b;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #fca5a5;
      font-size: 0.875rem;
      width: 100%;
      max-width: 520px;
    }
    .result { width: 100%; max-width: 520px; display: flex; flex-direction: column; gap: 0.5rem; }
    .result .title { font-size: 0.75rem; color: #6b7280; }
    .result .box {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 1.25rem;
      font-size: 0.875rem;
      color: #e5e7eb;
      line-height: 1.6;
      white-space: pre-wrap;
      max-height: 24rem;
      overflow-y: auto;
    }
    .result .copy {
      align-self: flex-end;
      background: none;
      border: none;
      color: #6366f1;
      font-size: 0.75rem;
      cursor: pointer;
    }
    .hidden { display: none; }
  </style>
</head>
<body>

<h1>🎙 Transcritor de Áudio</h1>

<div class="toggle">
  <button class="active" onclick="setMode('file')">📁 Enviar Arquivo</button>
  <button onclick="setMode('link')">🔗 Colar Link</button>
</div>

<!-- File panel -->
<div class="panel" id="filePanel">
  <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()"
    ondragover="event.preventDefault();this.classList.add('drag')"
    ondragleave="this.classList.remove('drag')"
    ondrop="handleDrop(event)">
    <p>Arraste um arquivo de áudio ou vídeo aqui</p>
    <small>ou clique para selecionar</small>
  </div>
  <input type="file" id="fileInput" accept="audio/*,video/*" class="hidden" onchange="handleFile(this.files[0])"/>
</div>

<!-- Link panel -->
<div class="panel hidden" id="linkPanel">
  <div class="link-row">
    <label>Cole um link do YouTube, Twitter, TikTok ou qualquer plataforma suportada</label>
    <div class="row">
      <input type="url" id="urlInput" placeholder="https://youtube.com/watch?v=..." onkeydown="if(event.key==='Enter') transcribeLink()"/>
      <button class="btn" id="linkBtn" onclick="transcribeLink()">Transcrever</button>
    </div>
  </div>
</div>

<div class="loading hidden" id="loading">
  <span class="spin">⏳</span>
  <span id="loadingText">Transcrevendo...</span>
</div>

<div class="error hidden" id="error"></div>

<div class="result hidden" id="result">
  <div class="title" id="videoTitle"></div>
  <div class="box" id="transcriptBox"></div>
  <button class="copy" onclick="copyText()">Copiar texto</button>
</div>

<script>
  const API = "https://audio-transcriber-1.onrender.com";
  let currentMode = "file";

  function setMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.toggle button').forEach((b,i) => b.classList.toggle('active', (mode==='file'&&i===0)||(mode==='link'&&i===1)));
    document.getElementById('filePanel').classList.toggle('hidden', mode !== 'file');
    document.getElementById('linkPanel').classList.toggle('hidden', mode !== 'link');
    reset();
  }

  function reset() {
    document.getElementById('error').classList.add('hidden');
    document.getElementById('result').classList.add('hidden');
    document.getElementById('loading').classList.add('hidden');
  }

  function showLoading(text) {
    reset();
    document.getElementById('loadingText').textContent = text;
    document.getElementById('loading').classList.remove('hidden');
  }

  function showError(msg) {
    document.getElementById('loading').classList.add('hidden');
    const el = document.getElementById('error');
    el.textContent = '⚠️ ' + msg;
    el.classList.remove('hidden');
  }

  function showResult(text, title) {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('transcriptBox').textContent = text;
    const t = document.getElementById('videoTitle');
    t.textContent = title ? '📺 ' + title : '';
    document.getElementById('result').classList.remove('hidden');
  }

  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('dropzone').classList.remove('drag');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  }

  async function handleFile(file) {
    if (!file) return;
    showLoading('Transcrevendo...');
    const form = new FormData();
    form.append('file', file);
    try {
      const res = await fetch(API + '/api/transcribe', { method: 'POST', body: form });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || res.statusText);
      showResult(data.text, '');
    } catch(e) { showError(e.message); }
  }

  async function transcribeLink() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) return;
    showLoading('Baixando e transcrevendo...');
    try {
      const res = await fetch(API + '/api/transcribe-link', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || res.statusText);
      showResult(data.text, data.title);
    } catch(e) { showError(e.message); }
  }

  function copyText() {
    navigator.clipboard.writeText(document.getElementById('transcriptBox').textContent);
  }
</script>
</body>
</html>
